<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Character Create | Zac</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #000000;
      --primary: #E100FF;
      --secondary: #FF0040;
      --text: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.1);
      --panel: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --font-title: 36px;
      --font-heading: 28px;
      --font-subtitle: 20px;
      --font-body: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--background);
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      font-size: var(--font-body);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      padding: 20px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(1120px, 100%);
      min-height: 64px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.78);
      padding: 10px 12px 10px 18px;
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      font-size: var(--font-subtitle);
      font-weight: 950;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(225, 0, 255, 0.26);
      font-size: var(--font-body);
      font-weight: 950;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 5px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 14px;
      color: rgba(255, 255, 255, 0.76);
      font-size: var(--font-body);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active,
    .tab:hover,
    .tab:focus-visible {
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.2), rgba(255, 0, 64, 0.18));
      color: var(--text);
      outline: none;
    }

    .tab-icon {
      display: none;
    }

    .login-cta,
    .button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 16px;
      color: var(--text);
      font-size: var(--font-body);
      font-weight: 900;
      white-space: nowrap;
    }

    .login-cta,
    .button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(255, 0, 64, 0.24);
    }

    .ghost-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }

    .button.large {
      min-height: 52px;
      padding: 0 24px;
    }

    .login-cta:focus-visible,
    .button:focus-visible,
    .ghost-button:focus-visible {
      outline: 3px solid rgba(225, 0, 255, 0.45);
      outline-offset: 4px;
    }

    main {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      padding: 128px 20px 80px;
      background:
        linear-gradient(135deg, rgba(225, 0, 255, 0.2), transparent 32%),
        linear-gradient(315deg, rgba(255, 0, 64, 0.18), transparent 38%),
        var(--background);
    }

    main::before {
      position: fixed;
      inset: 0;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      width: min(1120px, 100%);
      margin: 0 auto;
      gap: 28px;
    }

    .page-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 28px;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      margin: 0 0 10px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .back-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      margin: 0 0 12px;
      border: 1px solid rgba(225, 0, 255, 0.34);
      border-radius: 999px;
      background: rgba(225, 0, 255, 0.1);
      padding: 5px 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      max-width: 820px;
      font-size: var(--font-title);
      line-height: 1.15;
    }

    h2 {
      font-size: var(--font-heading);
      line-height: 1.16;
    }

    h3 {
      font-size: var(--font-subtitle);
      line-height: 1.2;
    }

    .lead {
      max-width: 680px;
      margin-top: 12px;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel,
    .card,
    .form-panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(18px);
    }

    .panel,
    .form-panel {
      padding: 22px;
    }

    .card {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .muted {
      color: var(--muted);
    }

    .meta,
    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      padding: 0 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 800;
    }

    .chip.hot {
      border-color: rgba(225, 0, 255, 0.5);
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
    }

    .metric {
      display: grid;
      gap: 6px;
      min-height: 118px;
      padding: 18px;
    }

    .metric strong {
      font-size: var(--font-heading);
      line-height: 1;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
    }

    .avatar,
    .node-dot {
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
      font-weight: 950;
    }

    .avatar {
      width: 44px;
      height: 44px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.38);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(225, 0, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(225, 0, 255, 0.18);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .markdown-editor {
      display: grid;
      grid-column: 1 / -1;
      gap: 10px;
    }

    .markdown-title {
      color: rgba(255, 255, 255, 0.84);
      font-weight: 850;
    }

    .markdown-editor textarea {
      min-height: 260px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      line-height: 1.68;
    }

    .markdown-help {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .markdown-help .chip {
      cursor: pointer;
    }

    .connection-picker {
      display: grid;
      grid-column: 1 / -1;
      gap: 12px;
    }

    .connection-field {
      position: relative;
      display: grid;
      grid-column: 1 / -1;
      gap: 8px;
    }

    .connection-title {
      font-size: 18px;
    }

    .connection-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 4;
      display: none;
      width: min(520px, 100%);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.96);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.42);
    }

    .connection-suggestions.is-open {
      display: grid;
    }

    .suggestion-option {
      display: grid;
      gap: 2px;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
    }

    .suggestion-option:last-child {
      border-bottom: 0;
    }

    .horizontal-scroll {
      display: grid;
      grid-auto-columns: minmax(260px, 320px);
      grid-auto-flow: column;
      gap: 14px;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      overscroll-behavior-inline: contain;
    }

    .select-card {
      position: relative;
      min-height: 210px;
      scroll-snap-align: start;
      cursor: pointer;
    }

    .select-card input {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .select-card:has(input:checked) {
      border-color: rgba(225, 0, 255, 0.54);
    }

    .select-card .muted {
      font-weight: 400;
    }

    .table {
      display: grid;
      gap: 8px;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
    }

    .canvas {
      position: relative;
      min-height: 460px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 24%, rgba(225, 0, 255, 0.24), transparent 22%),
        radial-gradient(circle at 72% 76%, rgba(255, 0, 64, 0.22), transparent 24%),
        rgba(255, 255, 255, 0.045);
    }

    .graph-line {
      position: absolute;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(225, 0, 255, 0.75), rgba(255, 0, 64, 0.75));
    }

    .graph-node {
      position: absolute;
      display: grid;
      min-width: 116px;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.74);
      padding: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .editor {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
    }

    .editor-page {
      min-height: 560px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #101014;
      padding: 32px;
    }

    .reader {
      max-width: 760px;
      margin: 0 auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      padding: clamp(24px, 5vw, 54px);
    }

    .reader p {
      margin-top: 18px;
      color: #333;
    }

    @media (min-width: 516px) and (max-width: 720px) {
      header {
        padding: 14px;
      }

      .header-inner {
        gap: 10px;
        padding: 10px 10px 10px 12px;
      }

      .header-actions {
        gap: 8px;
      }

      .tab {
        padding: 0 8px;
      }

      .login-cta {
        padding: 0 12px;
      }
    }

    @media (max-width: 900px) {
      .page-hero,
      .grid.two,
      .grid.three,
      .grid.four,
      .form-grid,
      .editor {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .table-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 515px) {
      header {
        padding: 14px;
      }

      .header-inner {
        justify-content: flex-start;
        min-height: 58px;
        padding: 12px;
        backdrop-filter: none;
      }

      .header-actions {
        margin-left: auto;
      }

      .tabs {
        position: fixed;
        right: 14px;
        bottom: 14px;
        left: 14px;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        width: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.86);
        backdrop-filter: blur(18px);
        box-shadow: 0 -18px 48px rgba(0, 0, 0, 0.42);
      }

      .tab {
        display: grid;
        justify-items: center;
        gap: 4px;
        min-height: 56px;
        padding: 0 10px;
        font-size: 11px;
        line-height: 1.1;
      }

      .tab-icon {
        display: block;
        width: 20px;
        height: 20px;
        color: var(--text);
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .login-cta {
        min-height: 38px;
        padding: 0 14px;
      }

      main {
        padding: 104px 14px 112px;
      }

      .panel,
      .form-panel {
        padding: 18px;
      }

      .list-item {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .list-item .chip {
        grid-column: 2;
        justify-self: start;
      }
    }

  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="./01-start.html" aria-label="Zac 시작 화면">
        <span class="brand-mark" aria-hidden="true">Z</span>
        <span>Zac</span>
      </a>
      <div class="header-actions">
        <nav class="tabs" aria-label="주요 메뉴">
          <a class="tab" href="./06-worlds-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3c2.4 2.7 3.6 5.7 3.6 9s-1.2 6.3-3.6 9"></path>
            <path d="M12 3c-2.4 2.7-3.6 5.7-3.6 9s1.2 6.3 3.6 9"></path>
            </svg>
            <span>세계관</span>
          </a>
          <a class="tab active" href="./26-character-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4"></circle>
            <path d="M5 21c1.2-4 3.5-6 7-6s5.8 2 7 6"></path>
            </svg>
            <span>캐릭터</span>
          </a>
          <a class="tab" href="./07-works-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h10a4 4 0 0 1 4 4v12H9a4 4 0 0 0-4-4z"></path>
            <path d="M5 4v12"></path>
            <path d="M9 8h6"></path>
            <path d="M9 12h5"></path>
            </svg>
            <span>창작물</span>
          </a>
          <a class="tab" href="./05-workspace.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h6l2 3h8v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
            <path d="M4 9h16"></path>
            </svg>
            <span>내 작업</span>
          </a>
        </nav>
        <a class="login-cta" href="./03-login.html">로그인</a>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">
      <section class="page-hero" aria-labelledby="page-title">
        <div>
          <button class="back-button" type="button" onclick="history.back()" aria-label="뒤로가기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg><span>뒤로가기</span></button>
          <p class="eyebrow">Character</p>
          <h1 id="page-title">자캐 만들기</h1>
          <p class="lead">캐릭터의 기본 프로필과 대표 소속을 세계관 안에 등록합니다.</p>
        </div>
        
      </section>

      <section class="grid">
        <article class="form-panel">
          <form>
            <section class="connection-picker" aria-labelledby="character-world-title">
              <span class="markdown-title connection-title" id="character-world-title">세계관 선택</span>
              <div class="horizontal-scroll" aria-label="세계관 선택 목록">
                <label class="card select-card">
                  <input type="radio" name="selected-world" checked>
                  <div class="card-row">
                    <span class="chip hot">World</span>
                  </div>
                  <h3>달빛 항구 연대기</h3>
                  <p class="muted">항구 도시와 감시단을 중심으로 움직이는 공동 세계관입니다.</p>
                  <div class="chip-row"><span class="chip">판타지</span><span class="chip">공동창작</span></div>
                </label>
                <label class="card select-card">
                  <input type="radio" name="selected-world">
                  <div class="card-row">
                    <span class="chip">World</span>
                  </div>
                  <h3>별무리 학원 기록부</h3>
                  <p class="muted">초능력 학생회와 비밀 동아리 설정을 함께 쌓아가는 학원 세계관입니다.</p>
                  <div class="chip-row"><span class="chip">학원</span><span class="chip">능력자</span></div>
                </label>
                <label class="card select-card">
                  <input type="radio" name="selected-world">
                  <div class="card-row">
                    <span class="chip">World</span>
                  </div>
                  <h3>붉은 사막의 계승자</h3>
                  <p class="muted">가문과 진영 갈등을 중심으로 캐릭터 관계가 확장되는 사막 판타지입니다.</p>
                  <div class="chip-row"><span class="chip">정치 판타지</span><span class="chip">가문</span></div>
                </label>
                <label class="card select-card">
                  <input type="radio" name="selected-world">
                  <div class="card-row">

            <div class="markdown-editor">

              <div class="markdown-help" aria-label="Markdown 문법 예시">

                <button class="chip" type="button" data-markdown-insert="## 배경">## 소제목</button>
                <button class="chip" type="button" data-markdown-insert="- 목록">- 목록</button>
                <button class="chip" type="button" data-markdown-insert="`키워드`">`키워드`</button>
              </div>
              <textarea aria-label="캐릭터 설정" placeholder="# 아린 레이븐&#10;&#10;항구 감시단 소속의 추적자입니다.&#10;&#10;## 성격&#10;- 침착하고 기록을 중요하게 여깁니다.&#10;- 검은 등대 사건 이후 관계를 다시 정리합니다."></textarea>

              <span class="markdown-title connection-title" id="character-affiliations-title">소속 연결</span>
              <label class="connection-field">선택된 소속<input type="text" data-connection-input="affiliations" value="항구 감시단(title='추적자', rank='정식 대원', status='CURRENT', started_label='1막 이전', ended_label='', note='대표 소속', is_primary='true'), " placeholder="소속명(title='', rank='', status='CURRENT', started_label='', ended_label='', note='', is_primary='false'), "><div class="connection-suggestions" data-connection-suggestions="affiliations"></div></label>
              <div class="horizontal-scroll">

                  <input type="checkbox" checked data-connection-checkbox>

  </main>
  <script>
    document.querySelectorAll(".markdown-editor").forEach((editor) => {
      const textarea = editor.querySelector("textarea");

      editor.querySelectorAll("[data-markdown-insert]").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.markdownInsert;
          const start = textarea.selectionStart;
          const end = textarea.selectionEnd;
          const before = textarea.value.slice(0, start);
          const after = textarea.value.slice(end);
          const prefix = before && !before.endsWith("\n") ? "\n" : "";
          const suffix = after && !after.startsWith("\n") ? "\n" : "";
          const inserted = `${prefix}${value}${suffix}`;

          textarea.value = `${before}${inserted}${after}`;
          textarea.focus();
          textarea.selectionStart = textarea.selectionEnd = start + inserted.length;
        });
      });
    });

    const formatAffiliationConnection = (card) => {
      return `${card.dataset.name}(title='${card.dataset.title}', rank='${card.dataset.rank}', status='${card.dataset.status}', started_label='${card.dataset.startedLabel}', ended_label='${card.dataset.endedLabel}', note='${card.dataset.note}', is_primary='${card.dataset.isPrimary}'), `;
    };

    document.querySelectorAll("[data-connection-input]").forEach((input) => {
      const group = input.dataset.connectionInput;
      const cards = [...document.querySelectorAll(`[data-connection-card="${group}"]`)];
      const suggestions = document.querySelector(`[data-connection-suggestions="${group}"]`);

      const closeSuggestions = () => suggestions?.classList.remove("is-open");
      const activeQuery = () => input.value.slice(input.value.lastIndexOf(",") + 1).trim().split("(")[0].trim();
      const matches = () => {
        const query = activeQuery();
        if (!query) return [];
        return cards.filter((card) => card.dataset.name.includes(query));
      };
      const syncInputFromCards = () => {
        input.value = cards
          .filter((card) => card.querySelector("[data-connection-checkbox]").checked)
          .map(formatAffiliationConnection)
          .join("");
      };
      const syncCardsFromInput = () => {
        cards.forEach((card) => {
          card.querySelector("[data-connection-checkbox]").checked = input.value.includes(card.dataset.name);
        });
      };
      const appendConnection = (card) => {
        const beforeLastComma = input.value.includes(",")
          ? input.value.slice(0, input.value.lastIndexOf(",") + 1).trim()
          : "";
        input.value = `${beforeLastComma ? `${beforeLastComma} ` : ""}${formatAffiliationConnection(card)}`;
        card.querySelector("[data-connection-checkbox]").checked = true;
        input.focus();
        input.selectionStart = input.selectionEnd = input.value.length;
        closeSuggestions();
      };
      const renderSuggestions = () => {
        if (!suggestions) return;
        suggestions.innerHTML = "";
        const list = matches();
        if (!list.length) {
          closeSuggestions();
          return;
        }
        list.forEach((card) => {
          const button = document.createElement("button");
          button.className = "suggestion-option";
          button.type = "button";
          button.innerHTML = `<strong>${card.dataset.name}</strong><span class="mini">${formatAffiliationConnection(card).trim()}</span>`;
          button.addEventListener("click", () => appendConnection(card));
          suggestions.appendChild(button);
        });
        suggestions.classList.add("is-open");
      };

      cards.forEach((card) => {
        card.querySelector("[data-connection-checkbox]").addEventListener("change", syncInputFromCards);
      });
      input.addEventListener("input", () => {
        syncCardsFromInput();
        renderSuggestions();
      });
      input.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        const [firstMatch] = matches();
        if (!firstMatch) return;
        event.preventDefault();
        appendConnection(firstMatch);
      });
      input.addEventListener("blur", () => window.setTimeout(closeSuggestions, 120));
    });
  </script>
</body>
