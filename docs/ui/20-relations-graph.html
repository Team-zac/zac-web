<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relations Graph | Zac</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #000000;
      --primary: #E100FF;
      --secondary: #FF0040;
      --text: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.1);
      --panel: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --font-title: 36px;
      --font-heading: 28px;
      --font-subtitle: 20px;
      --font-body: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--background);
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      font-size: var(--font-body);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      padding: 20px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(1120px, 100%);
      min-height: 64px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.78);
      padding: 10px 12px 10px 18px;
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      font-size: var(--font-subtitle);
      font-weight: 950;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(225, 0, 255, 0.26);
      font-size: var(--font-body);
      font-weight: 950;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 5px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 14px;
      color: rgba(255, 255, 255, 0.76);
      font-size: var(--font-body);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active,
    .tab:hover,
    .tab:focus-visible {
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.2), rgba(255, 0, 64, 0.18));
      color: var(--text);
      outline: none;
    }

    .tab-icon {
      display: none;
    }

    .login-cta,
    .button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 16px;
      color: var(--text);
      font-size: var(--font-body);
      font-weight: 900;
      white-space: nowrap;
    }

    .login-cta,
    .button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(255, 0, 64, 0.24);
    }

    .ghost-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }

    .danger-button {
      border-color: rgba(255, 0, 64, 0.34);
      color: #FF7A96;
      box-shadow: none;
    }

    .button.large {
      min-height: 52px;
      padding: 0 24px;
    }

    .login-cta:focus-visible,
    .button:focus-visible,
    .ghost-button:focus-visible {
      outline: 3px solid rgba(225, 0, 255, 0.45);
      outline-offset: 4px;
    }

    main {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      padding: 128px 20px 80px;
      background:
        linear-gradient(135deg, rgba(225, 0, 255, 0.2), transparent 32%),
        linear-gradient(315deg, rgba(255, 0, 64, 0.18), transparent 38%),
        var(--background);
    }

    main::before {
      position: fixed;
      inset: 0;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      width: min(1120px, 100%);
      min-width: 0;
      margin: 0 auto;
      gap: 28px;
    }

    .page-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 28px;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      margin: 0 0 10px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .back-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      margin: 0 0 12px;
      border: 1px solid rgba(225, 0, 255, 0.34);
      border-radius: 999px;
      background: rgba(225, 0, 255, 0.1);
      padding: 5px 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      max-width: 820px;
      font-size: var(--font-title);
      line-height: 1.15;
    }

    h2 {
      font-size: var(--font-heading);
      line-height: 1.16;
    }

    h3 {
      font-size: var(--font-subtitle);
      line-height: 1.2;
    }

    .lead {
      max-width: 680px;
      margin-top: 12px;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modal-actions .button,
    .modal-actions .ghost-button {
      width: 100%;
    }

    .grid {
      display: grid;
      min-width: 0;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel,
    .card,
    .form-panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(18px);
    }

    .panel,
    .form-panel {
      min-width: 0;
      padding: 22px;
    }

    .card {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .muted {
      color: var(--muted);
    }

    .meta,
    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      padding: 0 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 800;
    }

    .chip.hot {
      border-color: rgba(225, 0, 255, 0.5);
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
    }

    .metric {
      display: grid;
      gap: 6px;
      min-height: 118px;
      padding: 18px;
    }

    .metric strong {
      font-size: var(--font-heading);
      line-height: 1;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
    }

    .avatar,
    .node-dot {
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
      font-weight: 950;
    }

    .avatar {
      width: 44px;
      height: 44px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.38);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(225, 0, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(225, 0, 255, 0.18);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .table {
      display: grid;
      gap: 8px;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
    }

    .canvas {
      position: relative;
      min-height: 520px;
      max-height: 620px;
      user-select: none;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 24%, rgba(225, 0, 255, 0.24), transparent 22%),
        radial-gradient(circle at 72% 76%, rgba(255, 0, 64, 0.22), transparent 24%),
        rgba(255, 255, 255, 0.045);
      cursor: grab;
      scrollbar-width: none;
      touch-action: none;
    }

    .canvas.is-panning {
      cursor: grabbing;
    }

    .canvas::-webkit-scrollbar {
      display: none;
    }

    .graph-space {
      position: relative;
      width: 1120px;
      height: 760px;
    }

    .graph-line {
      position: absolute;
      z-index: 1;
      height: 24px;
      border: 0;
      background: transparent;
      padding: 0;
      transform-origin: left center;
      color: var(--text);
      cursor: pointer;
    }

    .graph-line::before {
      position: absolute;
      top: 50%;
      right: 0;
      left: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(225, 0, 255, 0.75), rgba(255, 0, 64, 0.75));
      content: "";
      transform: translateY(-50%);
    }

    .graph-line:hover::before,
    .graph-line:focus-visible::before {
      height: 4px;
    }

    .graph-line:focus-visible {
      outline: 3px solid rgba(225, 0, 255, 0.45);
      outline-offset: 4px;
    }

    .graph-node {
      position: absolute;
      z-index: 2;
      display: grid;
      width: 144px;
      min-height: 80px;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.74);
      padding: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .relation-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-start;
      justify-content: center;
      background: rgba(0, 0, 0, 0.68);
      padding: 112px 20px 20px;
    }

    .relation-modal.is-open {
      display: flex;
    }

    .modal-card {
      display: grid;
      width: min(480px, 100%);
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(10, 10, 14, 0.96);
      padding: 22px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
    }

    .editor {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
    }

    .editor-page {
      min-height: 560px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #101014;
      padding: 32px;
    }

    .reader {
      max-width: 760px;
      margin: 0 auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      padding: clamp(24px, 5vw, 54px);
    }

    .reader p {
      margin-top: 18px;
      color: #333;
    }

    @media (min-width: 516px) and (max-width: 720px) {
      header {
        padding: 14px;
      }

      .header-inner {
        gap: 10px;
        padding: 10px 10px 10px 12px;
      }

      .header-actions {
        gap: 8px;
      }

      .tab {
        padding: 0 8px;
      }

      .login-cta {
        padding: 0 12px;
      }
    }

    @media (max-width: 900px) {
      .page-hero,
      .grid.two,
      .grid.three,
      .grid.four,
      .form-grid,
      .editor {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .modal-card .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .table-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 515px) {
      header {
        padding: 14px;
      }

      .header-inner {
        justify-content: flex-start;
        min-height: 58px;
        padding: 12px;
        backdrop-filter: none;
      }

      .header-actions {
        margin-left: auto;
      }

      .tabs {
        position: fixed;
        right: 14px;
        bottom: 14px;
        left: 14px;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        width: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.86);
        backdrop-filter: blur(18px);
        box-shadow: 0 -18px 48px rgba(0, 0, 0, 0.42);
      }

      .tab {
        display: grid;
        justify-items: center;
        gap: 4px;
        min-height: 56px;
        padding: 0 10px;
        font-size: 11px;
        line-height: 1.1;
      }

      .tab-icon {
        display: block;
        width: 20px;
        height: 20px;
        color: var(--text);
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .login-cta {
        min-height: 38px;
        padding: 0 14px;
      }

      main {
        padding: 104px 14px 112px;
      }

      .relation-modal {
        padding: 92px 14px 92px;
      }

      .panel,
      .form-panel {
        padding: 18px;
      }

      .list-item {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .list-item .chip {
        grid-column: 2;
        justify-self: start;
      }
    }

  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="./01-start.html" aria-label="Zac 시작 화면">
        <span class="brand-mark" aria-hidden="true">Z</span>
        <span>Zac</span>
      </a>
      <div class="header-actions">
        <nav class="tabs" aria-label="주요 메뉴">
          <a class="tab" href="./06-worlds-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3c2.4 2.7 3.6 5.7 3.6 9s-1.2 6.3-3.6 9"></path>
            <path d="M12 3c-2.4 2.7-3.6 5.7-3.6 9s1.2 6.3 3.6 9"></path>
            </svg>
            <span>세계관</span>
          </a>
          <a class="tab active" href="./26-character-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4"></circle>
            <path d="M5 21c1.2-4 3.5-6 7-6s5.8 2 7 6"></path>
            </svg>
            <span>캐릭터</span>
          </a>
          <a class="tab" href="./07-works-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h10a4 4 0 0 1 4 4v12H9a4 4 0 0 0-4-4z"></path>
            <path d="M5 4v12"></path>
            <path d="M9 8h6"></path>
            <path d="M9 12h5"></path>
            </svg>
            <span>창작물</span>
          </a>
          <a class="tab" href="./05-workspace.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h6l2 3h8v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
            <path d="M4 9h16"></path>
            </svg>
            <span>내 작업</span>
          </a>
        </nav>
        <a class="login-cta" href="./03-login.html">로그인</a>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">
      <section class="page-hero" aria-labelledby="page-title">
        <div>
          <button class="back-button" type="button" onclick="history.back()" aria-label="뒤로가기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg><span>뒤로가기</span></button>
          <p class="eyebrow">Graph</p>
          <h1 id="page-title">자캐 관계도</h1>
          <p class="lead">캐릭터 관계 생성, 수정, 조회를 그래프 화면 하나에서 처리합니다.</p>
        </div>
        <div class="hero-actions"><button class="button" type="button" data-open-add-relation>관계 추가</button></div>
      </section>

<section class="grid">
        <article class="panel">
          <div class="card-row">
            <h2>관계 그래프</h2>
            <span class="chip hot">편집 가능</span>
          </div>
          <div class="canvas" data-pan-canvas aria-label="캐릭터 관계도 그래프">
            <div class="graph-space">
              <button class="graph-line" type="button" data-relation-title="아린 ↔ 카엘" data-relation-name="과거 인연" data-relation-status="ACTIVE" data-relation-direction="BIDIRECTIONAL" data-relation-visibility="SHARED" data-relation-context="항구 감시단" data-relation-description="등대 사건 이전부터 이어진 복합적인 신뢰와 갈등." aria-label="아린과 카엘 관계 선택" style="left: 192px; top: 190px; width: 404px; rotate: 8.5deg;"></button>
              <button class="graph-line" type="button" data-relation-title="아린 ↔ 세라" data-relation-name="추적자와 협상가" data-relation-status="ACTIVE" data-relation-direction="DIRECTED" data-relation-visibility="SHARED" data-relation-context="밀수 연합" data-relation-description="감시단의 수사와 밀수 연합의 거래가 충돌하며 형성된 긴장 관계." aria-label="아린과 세라 관계 선택" style="left: 192px; top: 190px; width: 394px; rotate: 62.8deg;"></button>
              <button class="graph-line" type="button" data-relation-title="카엘 ↔ 리온" data-relation-name="기록된 비밀" data-relation-status="RUMORED" data-relation-direction="DIRECTED" data-relation-visibility="PRIVATE" data-relation-context="기록관 조합" data-relation-description="리온은 카엘의 과거 소속과 검은 등대 문서의 빈칸을 알고 있습니다." aria-label="카엘과 리온 관계 선택" style="left: 592px; top: 250px; width: 340px; rotate: 40.4deg;"></button>

              <button class="graph-line" type="button" data-relation-title="카엘 ↔ 노아" data-relation-name="감시 대상" data-relation-status="ACTIVE" data-relation-direction="DIRECTED" data-relation-visibility="PRIVATE" data-relation-context="항구 감시단" data-relation-description="노아는 감시단 내부 규정에 따라 카엘의 이동 기록을 추적합니다." aria-label="카엘과 노아 관계 선택" style="left: 592px; top: 250px; width: 386px; rotate: -9deg;"></button>
              <div class="graph-node" style="left: 120px; top: 150px;"><strong>아린</strong><span class="mini">항구 감시단</span></div>

              <div class="graph-node" style="left: 300px; top: 500px;"><strong>세라</strong><span class="mini">밀수 연합</span></div>
              <div class="graph-node" style="left: 780px; top: 430px;"><strong>리온</strong><span class="mini">기록관 조합</span></div>

      </section>

      <div class="relation-modal" data-selected-relation-modal role="dialog" aria-modal="true" aria-labelledby="selected-relation-title">
        <div class="modal-card">
          <div class="card-row">
            <h2 id="selected-relation-title">선택한 관계</h2>
            <button class="ghost-button" type="button" data-close-modal>닫기</button>
          </div>
          <form>
            <label>관계명<input id="selected-relation-name" value="과거 인연"></label>
            <div class="form-grid">
              <label>출발 캐릭터<select><option>아린</option><option>카엘</option><option>세라</option><option>리온</option><option>노아</option></select></label>
              <label>대상 캐릭터<select><option>카엘</option><option>세라</option><option>리온</option><option>노아</option><option>아린</option></select></label>
            </div>
            <div class="form-grid">
              <label>상태<select id="selected-relation-status"><option>ACTIVE</option><option>PAST</option><option>RUMORED</option><option>ENDED</option><option>UNKNOWN</option></select></label>
              <label>방향성<select id="selected-relation-direction"><option>DIRECTED</option><option>BIDIRECTIONAL</option></select></label>
            </div>
            <div class="form-grid">
              <label>공개 범위<select id="selected-relation-visibility"><option>PRIVATE</option><option>SHARED</option><option>PUBLIC</option></select></label>
              <label>관계 맥락 소속<select id="selected-relation-context"><option>없음</option><option>항구 감시단</option><option>검은 등대</option><option>밀수 연합</option><option>기록관 조합</option></select></label>
            </div>
            <label>설명<input id="selected-relation-description" value="등대 사건 이전부터 이어진 복합적인 신뢰와 갈등."></label>
            <div class="hero-actions modal-actions">
              <button class="ghost-button danger-button" type="button" data-delete-relation>관계 삭제</button>
              <a class="button" href="./20-relations-graph.html">관계 저장</a>
            </div>
          </form>
        </div>
      </div>

      <div class="relation-modal" data-add-relation-modal role="dialog" aria-modal="true" aria-labelledby="add-relation-title">
        <div class="modal-card">
          <div class="card-row">
            <h2 id="add-relation-title">관계 추가</h2>
            <button class="ghost-button" type="button" data-close-modal>닫기</button>
          </div>
          <form>
            <label>관계명<input placeholder="예: 동맹, 과거 인연, 감시 대상"></label>
            <div class="form-grid">
              <label>출발 캐릭터<select><option>아린</option><option>카엘</option><option>세라</option><option>리온</option><option>노아</option></select></label>
              <label>대상 캐릭터<select><option>카엘</option><option>세라</option><option>리온</option><option>노아</option><option>아린</option></select></label>
            </div>
            <div class="form-grid">
              <label>상태<select><option>ACTIVE</option><option>PAST</option><option>RUMORED</option><option>ENDED</option><option>UNKNOWN</option></select></label>
              <label>방향성<select><option>DIRECTED</option><option>BIDIRECTIONAL</option></select></label>
            </div>
            <div class="form-grid">
              <label>공개 범위<select><option>PRIVATE</option><option>SHARED</option><option>PUBLIC</option></select></label>
              <label>관계 맥락 소속<select><option>없음</option><option>항구 감시단</option><option>검은 등대</option><option>밀수 연합</option><option>기록관 조합</option></select></label>
            </div>
            <label>설명<input placeholder="관계의 맥락과 변화 가능성을 적어주세요."></label>
            <a class="button" href="./20-relations-graph.html">관계 생성</a>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script>
    const selectedRelationTitle = document.querySelector("#selected-relation-title");
    const selectedRelationName = document.querySelector("#selected-relation-name");
    const selectedRelationStatus = document.querySelector("#selected-relation-status");
    const selectedRelationDirection = document.querySelector("#selected-relation-direction");
    const selectedRelationVisibility = document.querySelector("#selected-relation-visibility");
    const selectedRelationContext = document.querySelector("#selected-relation-context");
    const selectedRelationDescription = document.querySelector("#selected-relation-description");
    const selectedRelationModal = document.querySelector("[data-selected-relation-modal]");
    const addRelationModal = document.querySelector("[data-add-relation-modal]");
    let activeRelationLine = null;

    const openModal = (modal) => {
      modal.classList.add("is-open");
    };

    const closeModal = (modal) => {
      modal.classList.remove("is-open");
    };

    document.querySelectorAll(".graph-line").forEach((line) => {
      line.addEventListener("click", () => {
        activeRelationLine = line;
        selectedRelationTitle.textContent = line.dataset.relationTitle;
        selectedRelationName.value = line.dataset.relationName;
        selectedRelationStatus.value = line.dataset.relationStatus;
        selectedRelationDirection.value = line.dataset.relationDirection;
        selectedRelationVisibility.value = line.dataset.relationVisibility;
        selectedRelationContext.value = line.dataset.relationContext;
        selectedRelationDescription.value = line.dataset.relationDescription;
        openModal(selectedRelationModal);
      });
    });

    document.querySelector("[data-delete-relation]")?.addEventListener("click", () => {
      activeRelationLine?.remove();
      activeRelationLine = null;
      closeModal(selectedRelationModal);
    });

    document.querySelector("[data-open-add-relation]").addEventListener("click", () => {
      openModal(addRelationModal);
    });

    document.querySelectorAll("[data-close-modal]").forEach((button) => {
      button.addEventListener("click", () => {
        closeModal(button.closest(".relation-modal"));
      });
    });

    document.querySelectorAll(".relation-modal").forEach((modal) => {
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal(modal);
        }
      });
    });

    document.querySelectorAll("[data-pan-canvas]").forEach((canvas) => {
      let isPanning = false;
      let startX = 0;
      let startY = 0;
      let scrollLeft = 0;
      let scrollTop = 0;

      canvas.addEventListener("pointerdown", (event) => {
        if (event.target.closest("a, button")) return;
        isPanning = true;
        canvas.classList.add("is-panning");
        canvas.setPointerCapture(event.pointerId);
        startX = event.clientX;
        startY = event.clientY;
        scrollLeft = canvas.scrollLeft;
        scrollTop = canvas.scrollTop;
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!isPanning) return;
        event.preventDefault();
        canvas.scrollLeft = scrollLeft - (event.clientX - startX);
        canvas.scrollTop = scrollTop - (event.clientY - startY);
      });

      const stopPanning = (event) => {
        if (!isPanning) return;
        isPanning = false;
        canvas.classList.remove("is-panning");
        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
      };

      canvas.addEventListener("pointerup", stopPanning);
      canvas.addEventListener("pointercancel", stopPanning);
      canvas.addEventListener("pointerleave", stopPanning);
    });
  </script>
</body>
