<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter Editor | Zac</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #000000;
      --primary: #E100FF;
      --secondary: #FF0040;
      --text: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.1);
      --panel: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --font-title: 36px;
      --font-heading: 28px;
      --font-subtitle: 20px;
      --font-body: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--background);
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      font-size: var(--font-body);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      padding: 20px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(1120px, 100%);
      min-height: 64px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.78);
      padding: 10px 12px 10px 18px;
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      font-size: var(--font-subtitle);
      font-weight: 950;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(225, 0, 255, 0.26);
      font-size: var(--font-body);
      font-weight: 950;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 5px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 14px;
      color: rgba(255, 255, 255, 0.76);
      font-size: var(--font-body);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active,
    .tab:hover,
    .tab:focus-visible {
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.2), rgba(255, 0, 64, 0.18));
      color: var(--text);
      outline: none;
    }

    .tab-icon {
      display: none;
    }

    .login-cta,
    .button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 16px;
      color: var(--text);
      font-size: var(--font-body);
      font-weight: 900;
      white-space: nowrap;
    }

    .login-cta,
    .button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 30px rgba(255, 0, 64, 0.24);
    }

    .ghost-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }

    .button.large {
      min-height: 52px;
      padding: 0 24px;
    }

    .login-cta:focus-visible,
    .button:focus-visible,
    .ghost-button:focus-visible {
      outline: 3px solid rgba(225, 0, 255, 0.45);
      outline-offset: 4px;
    }

    main {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      padding: 128px 20px 80px;
      background:
        linear-gradient(135deg, rgba(225, 0, 255, 0.2), transparent 32%),
        linear-gradient(315deg, rgba(255, 0, 64, 0.18), transparent 38%),
        var(--background);
    }

    main::before {
      position: fixed;
      inset: 0;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      width: min(1120px, 100%);
      margin: 0 auto;
      gap: 28px;
    }

    .page-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 28px;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      margin: 0 0 10px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .back-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      margin: 0 0 12px;
      border: 1px solid rgba(225, 0, 255, 0.34);
      border-radius: 999px;
      background: rgba(225, 0, 255, 0.1);
      padding: 5px 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      max-width: 820px;
      font-size: var(--font-title);
      line-height: 1.15;
    }

    h2 {
      font-size: var(--font-heading);
      line-height: 1.16;
    }

    h3 {
      font-size: var(--font-subtitle);
      line-height: 1.2;
    }

    .lead {
      max-width: 680px;
      margin-top: 12px;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel,
    .card,
    .form-panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(18px);
    }

    .panel,
    .form-panel {
      padding: 22px;
    }

    .card {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .muted {
      color: var(--muted);
    }

    .meta,
    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      padding: 0 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 800;
    }

    button.chip {
      cursor: pointer;
    }

    .chip.hot {
      border-color: rgba(225, 0, 255, 0.5);
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
    }

    .metric {
      display: grid;
      gap: 6px;
      min-height: 118px;
      padding: 18px;
    }

    .metric strong {
      font-size: var(--font-heading);
      line-height: 1;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list-item {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "chapter status"
        "title delete";
      column-gap: 12px;
      row-gap: 10px;
      align-items: start;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
      cursor: pointer;
    }

    .list-item.active {
      border-color: rgba(225, 0, 255, 0.5);
    }

    .list-item .chip:first-child {
      grid-area: chapter;
      width: fit-content;
      white-space: nowrap;
    }

    .list-item > span:nth-child(2) {
      grid-area: title;
    }

    .list-item .chip {
      min-height: auto;
      border: 1px solid rgba(225, 0, 255, 0.34);
      border-radius: 999px;
      background: rgba(225, 0, 255, 0.1);
      padding: 5px 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .list-item .status-chip {
      grid-area: status;
      align-self: start;
    }

    .list-item .icon-button {
      grid-area: delete;
    }

    .icon-button {
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.82);
      cursor: pointer;
    }

    .icon-button:hover {
      color: var(--text);
    }

    .icon-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .avatar,
    .node-dot {
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(225, 0, 255, 0.24), rgba(255, 0, 64, 0.18));
      color: var(--text);
      font-weight: 950;
    }

    .avatar {
      width: 44px;
      height: 44px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.38);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(225, 0, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(225, 0, 255, 0.18);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .table {
      display: grid;
      gap: 8px;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
    }

    .canvas {
      position: relative;
      min-height: 460px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 24%, rgba(225, 0, 255, 0.24), transparent 22%),
        radial-gradient(circle at 72% 76%, rgba(255, 0, 64, 0.22), transparent 24%),
        rgba(255, 255, 255, 0.045);
    }

    .graph-line {
      position: absolute;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(225, 0, 255, 0.75), rgba(255, 0, 64, 0.75));
    }

    .graph-node {
      position: absolute;
      display: grid;
      min-width: 116px;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.74);
      padding: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .editor {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
    }

    .editor-page {
      display: grid;
      gap: 14px;
      min-height: 560px;
      border-radius: 8px;
      background: #000;
      color: #fff;
      padding: 0;
    }

    .chapter-title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .chapter-title-input {
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 0;
      background: transparent;
      padding: 0 0 12px;
      color: #fff;
      font-size: var(--font-heading);
      font-weight: 900;
      line-height: 1.2;
    }

    .chapter-title-input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    .chapter-title-input:focus {
      border-color: transparent;
      border-bottom-color: var(--primary);
      box-shadow: none;
    }

    .markdown-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .publish-status-select {
      width: auto;
      min-width: 150px;
      margin-left: auto;
      min-height: 36px;
      padding: 0 12px;
    }

    .markdown-editor {
      min-height: 460px;
      border-color: rgba(255, 255, 255, 0.18);
      background: #000;
      color: #fff;
      line-height: 1.75;
      resize: vertical;
    }

    .markdown-editor::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    .reader {
      max-width: 760px;
      margin: 0 auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      padding: clamp(24px, 5vw, 54px);
    }

    .reader p {
      margin-top: 18px;
      color: #333;
    }

    @media (min-width: 516px) and (max-width: 720px) {
      header {
        padding: 14px;
      }

      .header-inner {
        gap: 10px;
        padding: 10px 10px 10px 12px;
      }

      .header-actions {
        gap: 8px;
      }

      .tab {
        padding: 0 8px;
      }

      .login-cta {
        padding: 0 12px;
      }
    }

    @media (max-width: 900px) {
      .page-hero,
      .grid.two,
      .grid.three,
      .grid.four,
      .form-grid,
      .editor {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .table-row {
        grid-template-columns: 1fr;
      }

      .chapter-title-row {
        grid-template-columns: 1fr;
      }

      .publish-status-select {
        width: 100%;
        margin-left: 0;
      }
    }

    @media (max-width: 515px) {
      header {
        padding: 14px;
      }

      .header-inner {
        justify-content: flex-start;
        min-height: 58px;
        padding: 12px;
        backdrop-filter: none;
      }

      .header-actions {
        margin-left: auto;
      }

      .tabs {
        position: fixed;
        right: 14px;
        bottom: 14px;
        left: 14px;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        width: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.86);
        backdrop-filter: blur(18px);
        box-shadow: 0 -18px 48px rgba(0, 0, 0, 0.42);
      }

      .tab {
        display: grid;
        justify-items: center;
        gap: 4px;
        min-height: 56px;
        padding: 0 10px;
        font-size: 11px;
        line-height: 1.1;
      }

      .tab-icon {
        display: block;
        width: 20px;
        height: 20px;
        color: var(--text);
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .login-cta {
        min-height: 38px;
        padding: 0 14px;
      }

      main {
        padding: 104px 14px 112px;
      }

      .panel,
      .form-panel {
        padding: 18px;
      }

      .list-item {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .list-item .chip {
        grid-column: 2;
        justify-self: start;
      }
    }

  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="./01-start.html" aria-label="Zac 시작 화면">
        <span class="brand-mark" aria-hidden="true">Z</span>
        <span>Zac</span>
      </a>
      <div class="header-actions">
        <nav class="tabs" aria-label="주요 메뉴">
          <a class="tab" href="./06-worlds-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3c2.4 2.7 3.6 5.7 3.6 9s-1.2 6.3-3.6 9"></path>
            <path d="M12 3c-2.4 2.7-3.6 5.7-3.6 9s1.2 6.3 3.6 9"></path>
            </svg>
            <span>세계관</span>
          </a>
          <a class="tab" href="./26-character-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4"></circle>
            <path d="M5 21c1.2-4 3.5-6 7-6s5.8 2 7 6"></path>
            </svg>
            <span>캐릭터</span>
          </a>
          <a class="tab active" href="./07-works-explore.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h10a4 4 0 0 1 4 4v12H9a4 4 0 0 0-4-4z"></path>
            <path d="M5 4v12"></path>
            <path d="M9 8h6"></path>
            <path d="M9 12h5"></path>
            </svg>
            <span>창작물</span>
          </a>
          <a class="tab" href="./05-workspace.html">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h6l2 3h8v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
            <path d="M4 9h16"></path>
            </svg>
            <span>내 작업</span>
          </a>
        </nav>
        <a class="login-cta" href="./03-login.html">로그인</a>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">
      <section class="page-hero" aria-labelledby="page-title">
        <div>
          <button class="back-button" type="button" onclick="history.back()" aria-label="뒤로가기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg><span>뒤로가기</span></button>
          <p class="eyebrow">Editor</p>
          <h1 id="page-title">챕터 에디터</h1>
          <p class="lead">장문 본문은 챕터 단위로 분리해 작성하고 저장합니다.</p>
        </div>
        <div class="hero-actions">
          <a class="button" href="./23-work-reader.html">미리보기</a>
          <a class="button" href="./28-work-detail.html">창작물 게시</a>
        </div>
      </section>

<section class="editor">
        <aside class="panel">
          <div class="card-row">
            <h2>챕터</h2>
            <button class="button" type="button">챕터 추가</button>
          </div>
          <ul class="list">
            <li
              class="list-item active"
              data-chapter-item
              data-chapter-title="항구에 드리운 검은 빛"
              data-chapter-status="DRAFT"
              data-chapter-visibility="PRIVATE"
              data-chapter-body="## 항구의 첫 단서&#10;&#10;달빛은 항구의 물결 위에서 잘게 부서졌다. 아린 레이븐은 검은 등대의 그림자가 평소보다 길게 늘어진 것을 보았다.&#10;&#10;- 검은 등대의 문 아래 표식&#10;- 감시단 장부에서 사라진 밤의 기록&#10;- 카엘 문이 남긴 항구 외곽의 흔적&#10;&#10;그 밤의 기록은 감시단의 장부 어디에도 남지 않았다. 그러나 모든 관계는 이 장면에서 다시 얽히기 시작했다."
            >
              <span class="chip">Chapter 1</span>
              <span><strong>항구에 드리운 검은 빛</strong></span>

          <textarea class="markdown-editor" aria-label="챕터 Markdown 본문">## 항구의 첫 단서

달빛은 항구의 물결 위에서 잘게 부서졌다. 아린 레이븐은 검은 등대의 그림자가 평소보다 길게 늘어진 것을 보았다.

- 검은 등대의 문 아래 표식
- 감시단 장부에서 사라진 밤의 기록
- 카엘 문이 남긴 항구 외곽의 흔적

그 밤의 기록은 감시단의 장부 어디에도 남지 않았다. 그러나 모든 관계는 이 장면에서 다시 얽히기 시작했다.</textarea>

  <script>
    const markdownEditor = document.querySelector(".markdown-editor");
    const markdownChips = document.querySelectorAll("[data-insert]");
    const chapterItems = document.querySelectorAll("[data-chapter-item]");
    const chapterTitleInput = document.querySelector(".chapter-title-input");
    const publishStatusSelect = document.querySelector(".publish-status-select");
    const chapterVisibilitySelect = document.querySelector(".chapter-visibility-select");

    markdownChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        if (!markdownEditor) return;
        const snippet = chip.dataset.insert || "";
        const start = markdownEditor.selectionStart;
        const end = markdownEditor.selectionEnd;
        const before = markdownEditor.value.slice(0, start);
        const after = markdownEditor.value.slice(end);
        const needsLeadingBreak = before && !before.endsWith("\n");
        const insertText = `${needsLeadingBreak ? "\n" : ""}${snippet}`;

        markdownEditor.value = `${before}${insertText}${after}`;
        const nextCursor = before.length + insertText.length;
        markdownEditor.focus();
        markdownEditor.setSelectionRange(nextCursor, nextCursor);
      });
    });

    chapterItems.forEach((item) => {
      item.addEventListener("click", (event) => {
        if (event.target.closest(".icon-button")) return;

        chapterItems.forEach((chapter) => chapter.classList.remove("active"));
        item.classList.add("active");

        if (chapterTitleInput) chapterTitleInput.value = item.dataset.chapterTitle || "";
        if (markdownEditor) markdownEditor.value = item.dataset.chapterBody || "";
        if (publishStatusSelect) publishStatusSelect.value = item.dataset.chapterStatus || "DRAFT";
        if (chapterVisibilitySelect) chapterVisibilitySelect.value = item.dataset.chapterVisibility || "PRIVATE";
      });
    });
  </script>
